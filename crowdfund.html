
<html>
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.15.0/ethers.umd.min.js"></script>
<script type="text/javascript" src="abilist.js">  </script>
<script type="text/javascript">
var accounts = null;
var cfcontract = null;
var resultbox = null;
var provider, signer;

window.addEventListener('load', crowdfund);

async function crowdfund() {
  if (window.ethereum) {

    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    accounts = [await signer.getAddress()];

    getCrowdFundInstance();

  } else {
    console.log('Non-Ethereum browser detected. You should consider trying MetaMask!');
  }
}

async function getCrowdFundInstance() {
	var address = "0xd5fB9aa4ddFaD9E9deeb062a1938A96D17aC83Ea";	// address of nameregistry
	var namereg = new ethers.Contract(address, nameregistryabi, signer);
	try {
		address = await namereg.getAddr("crowdfund");
		if (address != "" && address != ethers.ZeroAddress) {
			cfcontract = new ethers.Contract(address, cfabi, signer);
			registerEventHandlers();
			alert(address);
		}
	} catch (error) {
		console.log(error);
	}
}


function registerEventHandlers() {
  let btn = document.getElementById("fund");
  btn.addEventListener('click', fund);
  btn = document.getElementById("investors");
  btn.addEventListener('click', investors);


  btn = document.getElementById("checkGoalReached");
  btn.addEventListener('click', checkGoalReached);
  btn = document.getElementById("kill");
  btn.addEventListener('click', showvalues);
  btn = document.getElementById("deadline");
  btn.addEventListener('click', showvalues);
  btn = document.getElementById("ended");
  btn.addEventListener('click', showvalues);
  btn = document.getElementById("getBalance");
  btn.addEventListener('click', showvalues);
  btn = document.getElementById("goalAmount");
  btn.addEventListener('click', showvalues);
  btn = document.getElementById("numInvestors");
  btn.addEventListener('click', showvalues);
  btn = document.getElementById("status");
  btn.addEventListener('click', showvalues);
  btn = document.getElementById("totalAmount");
  btn.addEventListener('click', showvalues);
  btn = document.getElementById("owner");
  btn.addEventListener('click', showvalues);

  resultbox = document.getElementById("resultbox");
  resultbox.innerHTML = JSON.stringify(accounts) + " " +accounts.length;
}

async function checkGoalReached() {
  if (cfcontract != null) {
    try {
	let tx = await cfcontract.checkGoalReached();
	let receipt = await tx.wait();
	resultbox.innerHTML = JSON.stringify(receipt, (key, val) => typeof val === 'bigint' ? val.toString() : val);

    } catch (error) {
        resultbox.innerHTML = "error occured";
        console.log(error);
    }
  }
}


async function fund() {
  if (cfcontract != null) {
    try {
        let valtxt = document.getElementById("fundamt");
        let val = valtxt.value;
	let tx = await cfcontract.fund({value: val});
	let receipt = await tx.wait();
	resultbox.innerHTML = JSON.stringify(receipt, (key, val) => typeof val === 'bigint' ? val.toString() : val);

    } catch (error) {
        resultbox.innerHTML = "error occured";
        console.log(error);
    }
  }
}


async function investors() {
  if (cfcontract != null) {
    try {
        let valtxt = document.getElementById("investorid");
        let id = valtxt.value;
	let value = await cfcontract.investors(id);
	resultbox.innerHTML = JSON.stringify(value, (key, val) => typeof val === 'bigint' ? val.toString() : val);

    } catch (error) {
        resultbox.innerHTML = "error occured";
        console.log(error);
    }
  }
}

async function showvalues() {
  if (cfcontract != null) {
    try {
	var deadline = this.id

	let value = await cfcontract[this.id]();
	if (deadline == "deadline") {
		var date = new Date(parseInt(value.toString()) * 1000);
		value = value.toString() + ": " + date.toString();
	}
	resultbox.innerHTML = JSON.stringify(value, (key, val) => typeof val === 'bigint' ? val.toString() : val);

    } catch (error) {
        resultbox.innerHTML = JSON.stringify(error);
        console.log(error);
    }
  }
}


</script>
</head>
<body>
<h1> Project Name: CrowdFund </h1>

<br/>
<input type="button" id="goalAmount" value="goalAmount">

<input type="button" id="numInvestors" value="numInvestors">
<br/>
<input type="button" id="status" value="status">

<input type="button" id="totalAmount" value="totalAmount">

</html>
