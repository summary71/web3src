<html> 
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.15.0/ethers.umd.min.js"></script>
<script type="text/javascript">
let accounts;
let resultbox;
let provider, contract, signer, userAddress;

window.addEventListener('load', async () => {
        if (window.ethereum) {
                window.alert('Modern dapp browsers')
        } else if (window.web3) {
                alert('Legacy dapp browsers')
        } else {
                alert('Non-Ethereum browser detected. You should consider trying MetaMask!');
        }
	let btn = document.getElementById("btn");
	btn.addEventListener('click', btnClicked);

	btn = document.getElementById("setMsg2");
	btn.addEventListener('click', setMsg2Clicked);
	btn = document.getElementById("setCounter");
	btn.addEventListener('click', setCounterClicked);
	btn = document.getElementById("counter");
	btn.addEventListener('click', counterClicked);
	btn = document.getElementById("getMsg2");
	btn.addEventListener('click', getMsg2Clicked);
	btn = document.getElementById("msg1");
	btn.addEventListener('click', msg1Clicked);
	btn = document.getElementById("owner");
	btn.addEventListener('click', ownerClicked);
	resultbox = document.getElementById("resultbox");

});

async function setMsg2Clicked() {
  if (contract != null) {
    try {
      let valtxt = document.getElementById("msg2");
      let val = valtxt.value;
      let tx = await contract.setMsg2(val);
      let receipt = await tx.wait(); // 트랜잭션 확인 대기
      resultbox.innerHTML = JSON.stringify(receipt);
    } catch {
      resultbox.innerHTML = "Error Occured";
    }
  }
}


async function setCounterClicked() {
    if (contract != null) {
        try {
            let tx = await contract.setCounter(); // 여기서 MetaMask 서명까지만 대기
            resultbox.innerHTML = "transactionHash: " + tx.hash;

            // await 없이 .then()으로 처리 → 함수가 바로 리턴됨
            tx.wait().then((receipt) => {
                resultbox.innerHTML = "receipt: " + JSON.stringify(receipt);
            }).catch((error) => {
                resultbox.innerHTML = "Error: " + error.message;
            });

            // 여기는 tx.wait() 끝나기 전에 바로 실행됨
            console.log("함수 리턴됨, 트랜잭션 확인 대기 중...");

        } catch (error) {
            resultbox.innerHTML = "Error: " + error.message;
        }
    }
}

async function counterClicked() {
	const value = await contract.counter();
	resultbox.innerHTML = value;
}

async function getMsg2Clicked() {
	const value = await contract.getMsg2();
	resultbox.innerHTML = value;
}
async function msg1Clicked() {
	const value = await contract.msg1();
	resultbox.innerHTML = value;
}
async function ownerClicked() {
	const value = await contract.owner();
	resultbox.innerHTML = value;
}

async function btnClicked() {
        accounts = await ethereum.request({ method: 'eth_requestAccounts' });
        const showAccount = document.querySelector('.showAccount');
        showAccount.innerHTML = accounts[0];

	let abiobj = [
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "_msg1",
				"type": "string"
			}
		],
		"stateMutability": "nonpayable",
		"type": "constructor"
	},
	{
		"inputs": [],
		"name": "counter",
		"outputs": [
			{
				"internalType": "uint8",
				"name": "",
				"type": "uint8"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "getMsg2",
		"outputs": [
			{
				"internalType": "string",
				"name": "",
				"type": "string"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "msg1",
		"outputs": [
			{
				"internalType": "string",
				"name": "",
				"type": "string"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "owner",
		"outputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			}
		],
		"stateMutability": "view",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "setCounter",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	},
	{
		"inputs": [
			{
				"internalType": "string",
				"name": "_msg2",
				"type": "string"
			}
		],
		"name": "setMsg2",
		"outputs": [],
		"stateMutability": "nonpayable",
		"type": "function"
	}
];



	provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();

	let contract_address = "0xc05B8B31A0A31b00c3D24001dDB29BFA30306c0f";
	contract = new ethers.Contract(contract_address, abiobj, signer)

	const value = await contract.counter();
	alert(value);
}
</script>
</head>

<body>
<h1> Event Test </h1>
<br/>
<input type="button" id="btn" value="Connect to Metamask">
<h2>Account: <span class="showAccount"></span></h2>
<input type="button" id="setMsg2" value="setMsg2()">
<input type="text" id="msg2" value="">
<br/>
<input type="button" id="setCounter" value="setCounter()">
<br/>
<input type="button" id="counter" value="counter">
<br/>
<input type="button" id="getMsg2" value="getMsg2">
<br/>
<input type="button" id="msg1" value="msg1">
<br/>
<input type="button" id="owner" value="owner">
<br/>
Result: <span id="resultbox"> </span>
</body> 
</html>
